<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechPulse Icon Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F172A;
      color: #E2E8F0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #4F46E5, #06B6D4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #94A3B8;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }
    .icon-grid {
      display: flex;
      gap: 48px;
      align-items: flex-end;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
    }
    .icon-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: #1E293B;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid #334155;
    }
    .icon-card canvas {
      border-radius: 4px;
      image-rendering: pixelated;
    }
    .icon-label {
      font-size: 0.85rem;
      color: #94A3B8;
      font-weight: 500;
    }
    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #4F46E5, #06B6D4);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-download-all {
      padding: 14px 36px;
      font-size: 1rem;
      border-radius: 12px;
      background: linear-gradient(135deg, #4F46E5, #06B6D4);
      color: white;
      border: none;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 24px;
    }
    .btn-download-all:hover { opacity: 0.9; transform: translateY(-2px); }
    .preview-section {
      margin-top: 32px;
      text-align: center;
    }
    .preview-section img {
      border-radius: 12px;
      border: 1px solid #334155;
    }
    .status {
      margin-top: 16px;
      padding: 12px 24px;
      background: #166534;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .status.show { display: block; }
  </style>
</head>
<body>
  <h1>TechPulse Icon Generator</h1>
  <p class="subtitle">Render the SVG icon to PNG at Chrome extension required sizes</p>

  <button class="btn-download-all" onclick="downloadAll()">Download All Sizes</button>

  <div class="icon-grid" id="iconGrid"></div>

  <div class="status" id="status">Icons downloaded successfully!</div>

  <div class="preview-section">
    <h3 style="margin-bottom:16px; color:#94A3B8;">Source SVG</h3>
    <img id="svgPreview" width="128" height="128" alt="SVG Preview">
  </div>

  <script>
    const SIZES = [16, 48, 128];
    const canvases = {};

    // Inline SVG source (same as icon.svg) so it works without a server
    const SVG_SOURCE = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F2FE;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <rect x="6" y="6" width="116" height="58" rx="26" ry="26" fill="white" opacity="0.12"/>
  <polygon points="72,16 42,68 58,68 48,112 88,56 68,56 80,16" fill="url(#boltGrad)" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 90,48 Q 98,64 90,80" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 98,40 Q 110,64 98,88" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
</svg>`;

    // Create a blob URL from the SVG
    const svgBlob = new Blob([SVG_SOURCE], { type: 'image/svg+xml;charset=utf-8' });
    const svgUrl = URL.createObjectURL(svgBlob);

    // Show SVG preview
    document.getElementById('svgPreview').src = svgUrl;

    // Create canvases for each size
    const grid = document.getElementById('iconGrid');
    SIZES.forEach(size => {
      const card = document.createElement('div');
      card.className = 'icon-card';

      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      canvas.style.width = Math.max(size, 64) + 'px';
      canvas.style.height = Math.max(size, 64) + 'px';
      canvases[size] = canvas;

      const label = document.createElement('div');
      label.className = 'icon-label';
      label.textContent = `${size} × ${size}`;

      const btn = document.createElement('button');
      btn.className = 'btn btn-primary';
      btn.textContent = `Download icon${size}.png`;
      btn.onclick = () => downloadPNG(size);

      card.appendChild(canvas);
      card.appendChild(label);
      card.appendChild(btn);
      grid.appendChild(card);
    });

    // Render the SVG to each canvas
    const img = new Image();
    img.onload = () => {
      SIZES.forEach(size => {
        const canvas = canvases[size];
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, size, size);
        ctx.drawImage(img, 0, 0, size, size);
      });
    };
    img.src = svgUrl;

    function downloadPNG(size) {
      const canvas = canvases[size];
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      showStatus(`Downloaded icon${size}.png`);
    }

    function downloadAll() {
      SIZES.forEach((size, i) => {
        setTimeout(() => downloadPNG(size), i * 300);
      });
      setTimeout(() => showStatus('All icons downloaded!'), SIZES.length * 300);
    }

    function showStatus(msg) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
