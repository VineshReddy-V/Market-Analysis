<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechPulse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="8" fill="url(#grad)"/>
            <path d="M16 6L20 14H12L16 6Z" fill="white" opacity="0.9"/>
            <path d="M16 26L12 18H20L16 26Z" fill="white" opacity="0.7"/>
            <rect x="14" y="13" width="4" height="6" rx="1" fill="white"/>
            <defs><linearGradient id="grad" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#4F46E5"/><stop offset="1" stop-color="#06B6D4"/></linearGradient></defs>
          </svg>
          <h1>TechPulse</h1>
        </div>
        <span class="last-updated" id="lastUpdated"></span>
      </div>
      <div class="header-right">
        <div class="search-box">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Search articles..." autocomplete="off">
        </div>
        <button class="btn-icon" id="refreshBtn" title="Refresh feeds">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        </button>
        <button class="btn-icon" id="settingsBtn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>
    </header>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-group" id="topicFilters">
        <button class="filter-chip active" data-topic="all">All</button>
        <button class="filter-chip" data-topic="ai">AI / ML</button>
        <button class="filter-chip" data-topic="webdev">Web Dev</button>
        <button class="filter-chip" data-topic="cloud">Cloud</button>
        <button class="filter-chip" data-topic="security">Security</button>
        <button class="filter-chip" data-topic="devops">DevOps</button>
        <button class="filter-chip" data-topic="opensource">Open Source</button>
        <button class="filter-chip" data-topic="mobile">Mobile</button>
        <button class="filter-chip" data-topic="database">Database</button>
      </div>
      <div class="filter-actions">
        <div class="source-dropdown" id="sourceDropdown">
          <button class="btn-text" id="sourceToggle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
            Sources
          </button>
          <div class="dropdown-menu" id="sourceMenu">
            <!-- Populated by JS -->
          </div>
        </div>
        <select class="sort-select" id="sortSelect">
          <option value="newest">Newest</option>
          <option value="score">Top Scored</option>
          <option value="aiScore">AI Relevance</option>
        </select>
        <div class="view-toggles">
          <button class="btn-icon view-btn active" data-view="all" title="All articles">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="btn-icon view-btn" data-view="bookmarks" title="Bookmarks">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </button>
          <button class="btn-icon view-btn" data-view="unread" title="Unread only">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Loading State -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <p>Fetching your tech news...</p>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <h3>No articles found</h3>
      <p id="emptyMessage">Try changing your filters or refreshing your feeds.</p>
    </div>

    <!-- Daily Digest -->
    <div class="digest-section" id="digestSection" style="display: none;">
      <div class="digest-header">
        <h2>Today's Top Stories</h2>
        <button class="btn-text" id="hideDigest">Hide</button>
      </div>
      <div class="digest-cards" id="digestCards">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Article Grid -->
    <div class="article-grid" id="articleGrid">
      <!-- Populated by JS -->
    </div>

    <!-- Load More -->
    <div class="load-more" id="loadMore" style="display: none;">
      <button class="btn-primary" id="loadMoreBtn">Load More</button>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar">
      <span id="articleCount"></span>
      <span id="sourceStats"></span>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
